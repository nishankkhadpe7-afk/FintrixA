name: fintrix-ci

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      run_deploy:
        description: "Run optional deploy placeholder job"
        required: false
        default: "false"

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend/fintrix-api
    env:
      DATABASE_URL: sqlite:///./test_ci.db
      ALLOWED_ORIGINS: http://localhost:3000
      ENABLE_NEWS_SCHEDULER: "0"
      ENABLE_AUTO_SCHEMA_CREATE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Reset CI database
        run: rm -f test_ci.db

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run backend tests
        run: pytest -q

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend/fintrix-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Frontend/fintrix-web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
        run: npm run build

  deploy-placeholder:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_deploy == 'true'
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-build
    steps:
      - name: Deployment placeholder
        run: |
          echo "Add platform-specific deploy commands here (Vercel/Render/Railway)."
          echo "This step intentionally does not auto-deploy without explicit setup."
